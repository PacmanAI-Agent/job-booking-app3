<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Job Booking</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<img src="logo.png" alt="App logo" class="logo">
<h1>Job Booking</h1>
</header>

<main>
<form id="bookingForm">
<p style="font-weight:bold;text-align:center;margin-top:0.5rem;">Arkwright's Freight Ltd</p>

<label style="color:red;">⚠️ API Key</label>
<input type="text" id="apiKey" placeholder="pat..." style="margin-bottom:1rem;border:2px solid red;">

<label>Date</label>
<input type="date" id="date-picker" required>

<label>Destination / Name</label>
<input type="text" name="Name" placeholder="Company name" required>

<label>Description</label>
<textarea name="Description" rows="2" placeholder="Job details"></textarea>

<label>Phone</label>
<input type="tel" name="Phone" placeholder="022 370 3540">

<label>Address</label>
<input type="text" name="Address" placeholder="Pick up address">

<div class="checkboxes">
<label><input type="checkbox" name="PickUp"> Pick-up</label>
<label><input type="checkbox" name="DropOff"> Drop-off</label>
</div>

<button type="button" onclick="bookAllJobs()">Book Job</button>
</form>

<section id="status"></section>
</main>

<script src="script.js?v=5"></script>
</body>
</html>
