<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Job Booking</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>
<body>
<header>
<img src="logo.png" alt="App logo" class="logo">
<h1>Job Booking</h1>
  </header>

<main>
<form id="bookingForm">
<!-- Fixed Company Name -->
<input type="hidden" id="company" name="Company" value="Arkwright’s Freight Ltd">
<p style="font-weight: bold; text-align:center; margin-top:0.5rem;">Arkwright’s Freight Ltd</p>

<!-- Company Destination -->
<label for="destination">Company Destination</label>
<input type="text" id="destination" name="Destination" placeholder="e.g. 123 Main St" required>

<!-- Optional Address -->
<label for="address">Address (optional)</label>
<input type="text" id="address" name="Address" placeholder="e.g. Suite 5, 456 Oak Ave">

<!-- Description -->
<label for="description">Description</label>
<textarea id="description" name="Description" rows="3" placeholder="Job details" required></textarea>

<!-- Pick‑up / Drop‑off -->
<div class="checkboxes">
<label><input type="checkbox" name="PickUp" value="Yes"> Pick‑up</label>
<label><input type="checkbox" name="DropOff" value="Yes"> Drop‑off</label>
</div>

<!-- Phone (optional) -->
<label for="phone">Phone (optional)</label>
<input type="tel" id="phone" name="Phone" placeholder="e.g. 022 370 3540">

<!-- Attachments -->
<label for="attachments">Attachments (photos / docs)</label>
<input type="file" id="attachments" name="Attachments" accept="image/*,application/pdf" multiple>

<!-- Date selector -->
<input type="date" id="date-picker" name="Date" required>

<button type="submit">Book Job</button>
</form>

<section id="status"></section>

</main>

<script>
  // Set default date to today on page load
  document.addEventListener('DOMContentLoaded', function() {
    const dateInput = document.getElementById('date-picker');
    if (dateInput) {
      dateInput.value = new Date().toISOString().split('T')[0];
    }
  });
</script>
</body>
</html>
