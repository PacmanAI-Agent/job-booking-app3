<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Job Booking</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<img src="logo.png" alt="App logo" class="logo">
<h1>Job Booking</h1>
</header>

<main>
<form id="bookingForm">
<p style="font-weight:bold;text-align:center;margin-top:0.5rem;">Arkwright's Freight Ltd</p>

<label style="color:red;">⚠️ API Key</label>
<input type="text" id="apiKey" placeholder="pat..." style="margin-bottom:1rem;border:2px solid red;">

<label>Date</label>
<input type="date" id="date-picker" required>

<label>Destination / Name</label>
<input type="text" name="Name" placeholder="Company name" required>

<label>Description</label>
<textarea name="Description" rows="2" placeholder="Job details"></textarea>

<label>Phone</label>
<input type="tel" name="Phone" placeholder="022 370 3540">

<label>Address</label>
<input type="text" name="Address" placeholder="Pick up address">

<div class="checkboxes">
<label><input type="checkbox" name="PickUp"> Pick-up</label>
<label><input type="checkbox" name="DropOff"> Drop-off</label>
</div>

<button type="button" onclick="bookJob()">Book Job</button>
</form>

<section id="status"></section>
</main>

<script>
const BASE_ID = 'appX0OtnSWt8JOKvh';
const TABLE_ID = 'tblHkIbvRNOcx6lVQ';

function getApiKey() {
  const input = document.getElementById('apiKey');
  let key = input?.value?.trim();
  if (key) localStorage.setItem('airtable_api_key', key);
  if (!key) key = localStorage.getItem('airtable_api_key');
  return key;
}

// Set today's date
const dateInput = document.getElementById('date-picker');
if (dateInput && !dateInput.value) {
  dateInput.value = new Date().toISOString().split('T')[0];
}

function bookJob() {
  const statusEl = document.getElementById('status');
  const apiKey = getApiKey();
  
  if (!apiKey) {
    statusEl.textContent = '⚠️ Enter your Airtable API key';
    return;
  }
  
  statusEl.textContent = 'Sending...';
  
  const date = document.getElementById('date-picker').value;
  const name = document.querySelector('[name="Name"]')?.value;
  const desc = document.querySelector('[name="Description"]')?.value;
  const phone = document.querySelector('[name="Phone"]')?.value;
  const addr = document.querySelector('[name="Address"]')?.value;
  const pickup = document.querySelector('[name="PickUp"]')?.checked;
  const dropoff = document.querySelector('[name="DropOff"]')?.checked;
  
  if (!name) {
    statusEl.textContent = '⚠️ Enter destination';
    return;
  }
  
  let statusVal = 'Todo';
  if (pickup && dropoff) statusVal = 'Pick up + Drop off';
  else if (pickup) statusVal = 'Pick up';
  else if (dropoff) statusVal = 'Drop off';
  
  let fullDesc = desc || '';
  if (phone) fullDesc += (fullDesc ? '\n' : '') + 'Phone: ' + phone;
  
  const fields = {
    Name: name,
    Description: fullDesc,
    'Pick Up Address': addr,
    'Pick up Date': date,
    Status: statusVal
  };
  
  fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${apiKey}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({fields})
  })
  .then(r => r.json())
  .then(data => {
    statusEl.textContent = '✅ Job booked!';
    document.getElementById('bookingForm').reset();
    dateInput.value = new Date().toISOString().split('T')[0];
  })
  .catch(err => {
    statusEl.textContent = '❌ ' + (err.message || 'Error');
  });
}
</script>
</body>
</html>
