<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Job Booking</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<img src="logo.png" alt="App logo" class="logo">
<h1>Job Booking</h1>
</header>

<main>
<form id="bookingForm">
<!-- Fixed Company Name -->
<input type="hidden" id="company" name="Company" value="Arkwright's Freight Ltd">
<p style="font-weight: bold; text-align:center; margin-top:0.5rem;">Arkwright's Freight Ltd</p>

<!-- API Key (required) -->
<label for="apiKey" style="color:red;">⚠️ Airtable API Key (required)</label>
<input type="text" id="apiKey" placeholder="patV0fJQn5wa1VWMH..." style="margin-bottom:1rem;border:2px solid red;">

<!-- Date -->
<label for="date-picker">Date</label>
<input type="date" id="date-picker" name="Date" required>

<!-- Job #1 -->
<div id="jobs-container">
<div class="job-entry" id="job-1">
<label>Destination</label>
<input type="text" name="Destination" placeholder="e.g. 123 Main St" required>

<label>Description</label>
<textarea name="Description" rows="2" placeholder="Job details" required></textarea>

<label>Phone (optional)</label>
<input type="tel" name="Phone" placeholder="e.g. 022 370 3540">

<label>Address (optional)</label>
<input type="text" name="Address" placeholder="e.g. Suite 5, 456 Oak Ave">

<div class="checkboxes">
<label><input type="checkbox" name="PickUp" value="Yes"> Pick-up</label>
<label><input type="checkbox" name="DropOff" value="Yes"> Drop-off</label>
</div>

<label>Attachments</label>
<input type="file" name="Attachments" accept="image/*,application/pdf" multiple>
</div>
</div>

<!-- Add Job button -->
<button type="button" onclick="addJob()" style="background:#f0f0f0;margin:0.5rem 0;">+ Add Another Job</button>

<!-- Submit -->
<button type="button" onclick="bookAllJobs()">Book All Jobs</button>
</form>

<section id="status"></section>
</main>

<script src="script.js"></script>
</body>
</html>
